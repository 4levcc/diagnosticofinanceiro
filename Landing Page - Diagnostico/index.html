(246,197,22,.25);display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F6C516\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin:0 0 8px\">Score personalizado<\u002Fh3>\n      <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Uma nota de 0 a 100 que traduz a maturidade financeira da sua empresa em um número claro.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#0A1A28;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px\" style-hover=\"border-color:rgba(246,197,22,.35)\">\n      <div style=\"width:46px;height:46px;border-radius:12px;background:rgba(246,197,22,.1);border:1px solid rgba(246,197,22,.25);display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F6C516\" stroke-width=\"2\"><line x1=\"6\" y1=\"20\" x2=\"6\" y2=\"12\"><\u002Fline><line x1=\"12\" y1=\"20\" x2=\"12\" y2=\"5\"><\u002Fline><line x1=\"18\" y1=\"20\" x2=\"18\" y2=\"9\"><\u002Fline><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin:0 0 8px\">Benchmark de mercado<\u002Fh3>\n      <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Veja como sua empresa se posiciona frente a outras PMEs do seu porte e setor.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#0A1A28;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px\" style-hover=\"border-color:rgba(246,197,22,.35)\">\n      <div style=\"width:46px;height:46px;border-radius:12px;background:rgba(246,197,22,.1);border:1px solid rgba(246,197,22,.25);display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F6C516\" stroke-width=\"2\" stroke-linejoin=\"round\"><polygon points=\"12,3 20,8 20,16 12,21 4,16 4,8\"><\u002Fpolygon><circle cx=\"12\" cy=\"12\" r=\"2.5\" fill=\"#F6C516\" stroke=\"none\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin:0 0 8px\">Radar interativo<\u002Fh3>\n      <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Um mapa visual das 6 dimensões da gestão, mostrando forças e pontos cegos de um relance.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#0A1A28;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:24px\" style-hover=\"border-color:rgba(246,197,22,.35)\">\n      <div style=\"width:46px;height:46px;border-radius:12px;background:rgba(246,197,22,.1);border:1px solid rgba(246,197,22,.25);display:flex;align-items:center;justify-content:center;margin-bottom:18px\">\n        <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#F6C516\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M12 3v2M5 6l1.4 1.4M3 13h2M19 6l-1.4 1.4M19 13h2\"><\u002Fpath><path d=\"M9 17a4 4 0 1 1 6 0c-.6.6-1 1.2-1 2H10c0-.8-.4-1.4-1-2z\"><\u002Fpath><line x1=\"10\" y1=\"21\" x2=\"14\" y2=\"21\"><\u002Fline><\u002Fsvg>\n      <\u002Fdiv>\n      <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:18px;margin:0 0 8px\">Insights automáticos<\u002Fh3>\n      <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Recomendações práticas de melhoria, geradas a partir das suas próprias respostas.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- HOW IT WORKS -->\n<section id=\"inovare-steps\" style=\"background:#061320;border-top:1px solid rgba(255,255,255,.06)\">\n  <div style=\"width:min(1180px,100%);margin:0 auto;padding:clamp(56px,8vw,96px) clamp(20px,5vw,40px)\">\n    <div style=\"text-align:center;max-width:620px;margin:0 auto clamp(38px,5vw,56px)\">\n      <div style=\"font-family:'Space Mono',monospace;font-size:12px;letter-spacing:.16em;color:#F6C516;text-transform:uppercase;margin-bottom:12px\">Como funciona<\u002Fdiv>\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(25px,3.6vw,39px);line-height:1.1;letter-spacing:-.02em;margin:0\">Três passos. Nenhuma planilha.<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:18px\">\n      <div style=\"position:relative;background:#0A1A28;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px 24px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;color:#F6C516;letter-spacing:.1em;margin-bottom:16px\">01<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;margin:0 0 8px\">Responda 49 indicadores<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Perguntas objetivas sobre as 6 dimensões da sua gestão. Leva cerca de 3 a 5 minutos.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;background:#0A1A28;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px 24px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;color:#F6C516;letter-spacing:.1em;margin-bottom:16px\">02<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;margin:0 0 8px\">Veja score e radar ao vivo<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Seu resultado se forma em tempo real conforme você responde — score, radar e benchmark.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"position:relative;background:#0A1A28;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:28px 24px\">\n        <div style=\"font-family:'Space Mono',monospace;font-size:13px;color:#F6C516;letter-spacing:.1em;margin-bottom:16px\">03<\u002Fdiv>\n        <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:19px;margin:0 0 8px\">Receba recomendações<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#8FA3B2;margin:0\">Insights personalizados apontam exatamente onde agir primeiro para destravar lucro.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- CAPTURE FORM -->\n<section id=\"inovare-form\" style=\"position:relative;background:radial-gradient(700px 360px at 50% 0%,rgba(246,197,22,.1),transparent 65%),#04101A\">\n  <div style=\"width:min(1180px,100%);margin:0 auto;padding:clamp(56px,8vw,100px) clamp(20px,5vw,40px);display:flex;justify-content:center\">\n    <div style=\"width:100%;max-width:540px\">\n      <div style=\"text-align:center;margin-bottom:30px\">\n        <h2 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(26px,3.8vw,40px);line-height:1.08;letter-spacing:-.02em;margin:0 0 12px\">Pronto para começar?<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.55;color:#A9BAC7;margin:0\">Leva 3 minutos, é totalmente gratuito e sem cadastro. Clique abaixo e seu diagnóstico abre na sequência.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:linear-gradient(180deg,#0B1C2B,#081420);border:1px solid rgba(255,255,255,.09);border-radius:20px;padding:clamp(28px,4vw,40px);box-shadow:0 30px 70px rgba(0,0,0,.45);text-align:center\">\n        <button onclick=\"{{ startDiagnostic }}\" style=\"width:100%;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:clamp(16px,2vw,18px);color:{{ ctaFg }};background:{{ ctaBg }};border:none;padding:18px 24px;border-radius:13px;cursor:pointer;box-shadow:0 12px 34px {{ ctaGlow }};transition:transform .15s\" style-hover=\"transform:translateY(-2px)\">Fazer meu diagnóstico gratuito →<\u002Fbutton>\n        <p style=\"text-align:center;font-size:12.5px;color:#5E7384;margin:16px 0 0\">🔒 Sem cadastro. Você vai direto para o diagnóstico interativo.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer id=\"privacidade\" style=\"border-top:1px solid rgba(255,255,255,.07);background:#031019\">\n  <div style=\"width:min(1180px,100%);margin:0 auto;padding:clamp(34px,5vw,48px) clamp(20px,5vw,40px);display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:space-between\">\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <img src=\"842991e1-8961-4340-abd8-f14e90c27535\" alt=\"INOVARE\" style=\"display:block;height:62px;width:auto;align-self:flex-start\">\n      <span style=\"font-size:13px;color:#5E7384\">© 2026 INOVARE Consultoria Empresarial · inovage.com.br<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-wrap:wrap;gap:20px;align-items:center\">\n      <a href=\"https://inovarege.com.br/wp-content/uploads/2026/06/PP.pdf\" style=\"font-size:13.5px;color:#8FA3B2;text-decoration:none\" style-hover=\"color:#EEF2F5\">Política de Privacidade<\u002Fa>\n      <span style=\"font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.1em;color:#5E7384;text-transform:uppercase\">Gestão estratégica integrada<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<!-- LOADING OVERLAY -->\n<sc-if value=\"{{ submitting }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"position:fixed;inset:0;z-index:90;background:rgba(4,16,26,.92);backdrop-filter:blur(8px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center\">\n  <div style=\"width:62px;height:62px;border-radius:50%;border:4px solid rgba(246,197,22,.18);border-top-color:#F6C516;animation:spin .8s linear infinite;margin-bottom:26px\"><\u002Fdiv>\n  <h3 style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:23px;margin:0 0 10px\">Carregando seu diagnóstico…<\u002Fh3>\n  <p style=\"font-size:15px;color:#A9BAC7;margin:0 0 20px;max-width:340px\">Tudo pronto! Você será redirecionado automaticamente em instantes.<\u002Fp>\n  <a href=\"{{ diagUrl }}\" style=\"font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:#8FA3B2;text-decoration:underline\">Não foi redirecionado? Clique aqui<\u002Fa>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;ctaColor&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;gold&quot;, &quot;green&quot;, &quot;blue&quot;], &quot;default&quot;: &quot;gold&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Conversão&quot; },\n  &quot;showHeroMockup&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Layout&quot; },\n  &quot;showTrustBar&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Layout&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { name: '', email: '', lgpd: false, touched: false, submitting: false };\n\n  get DIAG() { return 'https://inovarege.com.br/diagnostico/'; }\n\n  setName = (e) => this.setState({ name: e.target.value });\n  setEmail = (e) => this.setState({ email: e.target.value });\n  toggleLgpd = (e) => this.setState({ lgpd: e.target.checked });\n\n  validate() {\n    const errs = {};\n    if (!this.state.name || this.state.name.trim().length < 2) errs.name = 'Informe seu nome completo.';\n    const em = (this.state.email || '').trim();\n    if (!/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(em)) errs.email = 'Informe um e-mail válido.';\n    if (!this.state.lgpd) errs.lgpd = 'É necessário aceitar para continuar.';\n    return errs;\n  }\n\n  submit = (e) => {\n    if (e && e.preventDefault) e.preventDefault();\n    const errs = this.validate();\n    this.setState({ touched: true });\n    if (Object.keys(errs).length) return;\n    try { localStorage.setItem('inovare_lead', JSON.stringify({ name: this.state.name, email: this.state.email, ts: Date.now() })); } catch (_) {}\n    this.setState({ submitting: true });\n    setTimeout(() => { try { window.location.href = this.DIAG; } catch (_) {} }, 2200);\n  };\n\n  scrollTo(id) {\n    const el = document.getElementById(id);\n    if (el) { const y = el.getBoundingClientRect().top + window.scrollY - 20; window.scrollTo({ top: y, behavior: 'smooth' }); }\n  }\n  startDiagnostic = () => {\n    this.setState({ submitting: true });\n    setTimeout(() => { try { window.location.href = this.DIAG; } catch (_) {} }, 2200);\n  };\n  scrollToForm = () => this.scrollTo('inovare-form');\n  scrollToSteps = () => this.scrollTo('inovare-steps');\n\n  renderVals() {\n    const errs = this.state.touched ? this.validate() : {};\n    const cta = this.props.ctaColor ?? 'gold';\n    const themes = {\n      gold:  { bg: 'linear-gradient(180deg,#FFD21E,#F0B90B)', fg: '#04101A', glow: 'rgba(246,197,22,.34)' },\n      green: { bg: 'linear-gradient(180deg,#26D98A,#11AE6B)', fg: '#04101A', glow: 'rgba(25,180,110,.34)' },\n      blue:  { bg: 'linear-gradient(180deg,#3D8BFF,#1E6BF0)', fg: '#FFFFFF', glow: 'rgba(45,125,246,.40)' },\n    };\n    const t = themes[cta] || themes.gold;\n    const fn = (this.state.name || '').trim().split(/\\s+/)[0] || '';\n    return {\n      name: this.state.name,\n      email: this.state.email,\n      lgpd: this.state.lgpd,\n      setName: this.setName,\n      setEmail: this.setEmail,\n      toggleLgpd: this.toggleLgpd,\n      submit: this.submit,\n      scrollToForm: this.scrollToForm,\n      startDiagnostic: this.startDiagnostic,\n      scrollToSteps: this.scrollToSteps,\n      nameErr: errs.name || '',\n      emailErr: errs.email || '',\n      lgpdErr: errs.lgpd || '',\n      nameBorder: errs.name ? '#FF6B6B' : 'rgba(255,255,255,.12)',\n      emailBorder: errs.email ? '#FF6B6B' : 'rgba(255,255,255,.12)',\n      submitting: this.state.submitting,\n      firstName: fn,\n      diagUrl: this.DIAG,\n      ctaBg: t.bg, ctaFg: t.fg, ctaGlow: t.glow,\n      showMockup: this.props.showHeroMockup ?? true,\n      showTrust: this.props.showTrustBar ?? true,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
