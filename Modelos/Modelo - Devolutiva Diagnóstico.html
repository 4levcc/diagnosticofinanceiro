document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

oke=\"#fff\" stroke-width=\"2\"><\u002Fcircle>\n      <text x=\"200\" y=\"2\" text-anchor=\"middle\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Controles Financeiros<\u002Ftext>\n      <text x=\"200\" y=\"20\" text-anchor=\"middle\" font-family=\"Archivo\" font-weight=\"800\" font-size=\"13\" fill=\"#1f9d57\">3.0<\u002Ftext>\n      <text x=\"352\" y=\"114\" text-anchor=\"start\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Capital de Giro<\u002Ftext>\n      <text x=\"352\" y=\"132\" text-anchor=\"start\" font-family=\"Archivo\" font-weight=\"800\" font-size=\"13\" fill=\"#1f9d57\">2.8<\u002Ftext>\n      <text x=\"352\" y=\"276\" text-anchor=\"start\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Projeções<\u002Ftext>\n      <text x=\"352\" y=\"292\" text-anchor=\"start\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Financeiras<\u002Ftext>\n      <text x=\"352\" y=\"310\" text-anchor=\"start\" font-family=\"Archivo\" font-weight=\"800\" font-size=\"13\" fill=\"#cf8a16\">2.4<\u002Ftext>\n      <text x=\"200\" y=\"388\" text-anchor=\"middle\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Custos e Preço<\u002Ftext>\n      <text x=\"200\" y=\"406\" text-anchor=\"middle\" font-family=\"Archivo\" font-weight=\"800\" font-size=\"13\" fill=\"#1f9d57\">2.5<\u002Ftext>\n      <text x=\"48\" y=\"276\" text-anchor=\"end\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Controle de<\u002Ftext>\n      <text x=\"48\" y=\"292\" text-anchor=\"end\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Resultados<\u002Ftext>\n      <text x=\"48\" y=\"310\" text-anchor=\"end\" font-family=\"Archivo\" font-weight=\"800\" font-size=\"13\" fill=\"#cf8a16\">2.1<\u002Ftext>\n      <text x=\"48\" y=\"114\" text-anchor=\"end\" font-family=\"Archivo\" font-weight=\"700\" font-size=\"13\" fill=\"#14233b\">Indicadores<\u002Ftext>\n      <text x=\"48\" y=\"132\" text-anchor=\"end\" font-family=\"Archivo\" font-weight=\"800\" font-size=\"13\" fill=\"#1f9d57\">2.6<\u002Ftext>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px 28px; margin-top:24px;\">\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46505f;\"><span style=\"width:11px; height:11px; border-radius:3px; background:#3b82f6;\"><\u002Fspan> Controles Financeiros<\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46505f;\"><span style=\"width:11px; height:11px; border-radius:3px; background:#f5a623;\"><\u002Fspan> Capital de Giro<\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46505f;\"><span style=\"width:11px; height:11px; border-radius:3px; background:#f97316;\"><\u002Fspan> Projeções Financeiras<\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46505f;\"><span style=\"width:11px; height:11px; border-radius:3px; background:#ef4444;\"><\u002Fspan> Custos e Preço<\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46505f;\"><span style=\"width:11px; height:11px; border-radius:3px; background:#e11d48;\"><\u002Fspan> Controle de Resultados<\u002Fdiv>\n    <div style=\"display:flex; align-items:center; gap:10px; font-size:14px; color:#46505f;\"><span style=\"width:11px; height:11px; border-radius:3px; background:#a855f7;\"><\u002Fspan> Indicadores<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PÁGINA 5 — INSIGHTS ===================== -->\n<section class=\"sheet\" style=\"width:210mm; min-height:297mm; background:#fff; box-shadow:0 6px 34px rgba(20,26,45,0.16); padding:22mm 18mm; box-sizing:border-box;\">\n  <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:6px;\">\n    <span style=\"width:26px; height:3px; background:#5a2fc2; border-radius:2px;\"><\u002Fspan>\n    <span style=\"font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#5a2fc2; font-weight:700;\">Leitura do Diagnóstico<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-size:30px; font-weight:800; color:#14233b; letter-spacing:-0.01em;\">Insights e prioridades<\u002Fh2>\n\n  <div style=\"background:#fdfaf2; border:1px solid #f3e6c6; border-left:4px solid #e6a019; border-radius:12px; padding:22px 24px; margin-top:26px;\">\n    <div style=\"font-family:'Archivo'; font-weight:800; font-size:15px; color:#9a6a09; letter-spacing:0.02em;\">MATURIDADE INTERMEDIÁRIA<\u002Fdiv>\n    <p style=\"font-size:15.5px; line-height:1.6; color:#5a4a26; margin-top:8px;\">Há fundamentos, mas gaps importantes. A empresa precisa sistematizar processos e começar a usar indicadores para tomada de decisão. O foco imediato deve estar em transformar dados já existentes em rotina de gestão.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"margin-top:30px;\">\n    <div style=\"font-size:13px; letter-spacing:0.06em; text-transform:uppercase; color:#5a2fc2; font-weight:700; margin-bottom:16px;\">Prioridade de atuação sugerida<\u002Fdiv>\n    <div style=\"display:flex; flex-direction:column; gap:14px;\">\n      <div style=\"display:flex; align-items:center; gap:16px; border:1px solid #ececf3; border-radius:12px; padding:18px 20px;\">\n        <div style=\"width:40px; height:40px; border-radius:10px; background:#fbe7ec; color:#b01d35; font-family:'Archivo'; font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex:none;\">1º<\u002Fdiv>\n        <div style=\"flex:1;\"><div style=\"font-size:16px; font-weight:700; color:#14233b; font-family:'Archivo';\">Controle de Resultados<\u002Fdiv><div style=\"font-size:13.5px; color:#6b7585; margin-top:2px;\">Ponto mais frágil — base para todas as decisões financeiras.<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Archivo'; font-weight:800; font-size:20px; color:#e11d48;\">2.1<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:16px; border:1px solid #ececf3; border-radius:12px; padding:18px 20px;\">\n        <div style=\"width:40px; height:40px; border-radius:10px; background:#fcecdf; color:#c2541a; font-family:'Archivo'; font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex:none;\">2º<\u002Fdiv>\n        <div style=\"flex:1;\"><div style=\"font-size:16px; font-weight:700; color:#14233b; font-family:'Archivo';\">Projeções Financeiras<\u002Fdiv><div style=\"font-size:13.5px; color:#6b7585; margin-top:2px;\">Pouca visibilidade de futuro e de necessidade de caixa.<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Archivo'; font-weight:800; font-size:20px; color:#f97316;\">2.4<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; align-items:center; gap:16px; border:1px solid #ececf3; border-radius:12px; padding:18px 20px;\">\n        <div style=\"width:40px; height:40px; border-radius:10px; background:#fdf3df; color:#9a6a09; font-family:'Archivo'; font-weight:800; font-size:18px; display:flex; align-items:center; justify-content:center; flex:none;\">3º<\u002Fdiv>\n        <div style=\"flex:1;\"><div style=\"font-size:16px; font-weight:700; color:#14233b; font-family:'Archivo';\">Custos e Preço<\u002Fdiv><div style=\"font-size:13.5px; color:#6b7585; margin-top:2px;\">Formação de preço ainda desconectada da estrutura de custos.<\u002Fdiv><\u002Fdiv>\n        <div style=\"font-family:'Archivo'; font-weight:800; font-size:20px; color:#ef4444;\">2.5<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"background:#f4f0fd; border-radius:14px; padding:22px 24px; margin-top:28px;\">\n    <div style=\"font-family:'Archivo'; font-weight:700; font-size:15px; color:#4a259e;\">Em resumo<\u002Fdiv>\n    <p style=\"font-size:14.5px; line-height:1.62; color:#5b4a85; margin-top:8px;\">A empresa tem uma base sólida em controles e capital de giro, mas perde força na hora de medir resultados, projetar o futuro e precificar com segurança. Avançar nessas três frentes destrava o próximo nível de maturidade.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PÁGINA 6 — RECOMENDAÇÕES ===================== -->\n<section class=\"sheet\" style=\"width:210mm; min-height:297mm; background:#fff; box-shadow:0 6px 34px rgba(20,26,45,0.16); padding:22mm 18mm; box-sizing:border-box;\">\n  <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:6px;\">\n    <span style=\"width:26px; height:3px; background:#5a2fc2; border-radius:2px;\"><\u002Fspan>\n    <span style=\"font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#5a2fc2; font-weight:700;\">Plano de Ação<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-size:30px; font-weight:800; color:#14233b; letter-spacing:-0.01em;\">Recomendações por dimensão<\u002Fh2>\n  <p style=\"font-size:15px; color:#5f6b7c; margin-top:8px;\">Orientações práticas para evoluir cada frente ao próximo nível de maturidade.<\u002Fp>\n\n  <div style=\"display:flex; flex-direction:column; gap:11px; margin-top:22px;\">\n\n    <div class=\"avoid-break\" style=\"border:1px solid #ececf3; border-radius:14px; padding:15px 20px; border-top:3px solid #e11d48;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <span style=\"font-size:11px; font-weight:800; letter-spacing:0.06em; color:#b01d35; background:#fbe7ec; padding:4px 10px; border-radius:6px; white-space:nowrap;\">PRIORIDADE 1<\u002Fspan>\n        <h3 style=\"font-size:18px; font-weight:700; color:#14233b;\">Controle de Resultados <span style=\"color:#e11d48;\">· 2.1<\u002Fspan><\u002Fh3>\n      <\u002Fdiv>\n      <p style=\"font-size:14.5px; line-height:1.58; color:#46505f; margin-top:10px;\">Monte uma <strong>DRE gerencial mensal<\u002Fstrong> e separe definitivamente as finanças da empresa das do sócio. Acompanhe o lucro líquido real mês a mês — sem essa apuração regular, não há base segura para nenhuma outra decisão financeira.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"avoid-break\" style=\"border:1px solid #ececf3; border-radius:14px; padding:15px 20px; border-top:3px solid #f97316;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <span style=\"font-size:11px; font-weight:800; letter-spacing:0.06em; color:#c2541a; background:#fcecdf; padding:4px 10px; border-radius:6px; white-space:nowrap;\">PRIORIDADE 2<\u002Fspan>\n        <h3 style=\"font-size:18px; font-weight:700; color:#14233b;\">Projeções Financeiras <span style=\"color:#f97316;\">· 2.4<\u002Fspan><\u002Fh3>\n      <\u002Fdiv>\n      <p style=\"font-size:14.5px; line-height:1.58; color:#46505f; margin-top:10px;\">Construa um <strong>orçamento anual com revisões trimestrais<\u002Fstrong> e projeção de fluxo de caixa para os próximos 90 dias. Decisões de investimento e contratação passam a se apoiar em cenários, e não em intuição.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"avoid-break\" style=\"border:1px solid #ececf3; border-radius:14px; padding:15px 20px; border-top:3px solid #ef4444;\">\n      <div style=\"display:flex; align-items:center; gap:10px;\">\n        <span style=\"font-size:11px; font-weight:800; letter-spacing:0.06em; color:#b0392f; background:#fdeaea; padding:4px 10px; border-radius:6px; white-space:nowrap;\">PRIORIDADE 3<\u002Fspan>\n        <h3 style=\"font-size:18px; font-weight:700; color:#14233b;\">Custos e Preço <span style=\"color:#ef4444;\">· 2.5<\u002Fspan><\u002Fh3>\n      <\u002Fdiv>\n      <p style=\"font-size:14.5px; line-height:1.58; color:#46505f; margin-top:10px;\">Implemente o <strong>custo por produto/serviço<\u002Fstrong> e a <strong>margem de contribuição<\u002Fstrong>. Garanta que cada venda cubra os custos fixos e gere lucro — essa é a base para qualquer política de desconto consciente.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"avoid-break\" style=\"border:1px solid #ececf3; border-radius:14px; padding:15px 20px; border-top:3px solid #3b82f6;\">\n      <h3 style=\"font-size:18px; font-weight:700; color:#14233b;\">Controles Financeiros <span style=\"color:#1f9d57;\">· 3.0<\u002Fspan><\u002Fh3>\n      <p style=\"font-size:14.5px; line-height:1.58; color:#46505f; margin-top:9px;\">Já há rotinas confiáveis. Para evoluir ao nível otimizado, <strong>integre contas a pagar e receber a um fluxo de caixa diário<\u002Fstrong> e automatize a conciliação bancária, reduzindo retrabalho e erros manuais.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"avoid-break\" style=\"border:1px solid #ececf3; border-radius:14px; padding:15px 20px; border-top:3px solid #f5a623;\">\n      <h3 style=\"font-size:18px; font-weight:700; color:#14233b;\">Capital de Giro <span style=\"color:#cf8a16;\">· 2.8<\u002Fspan><\u002Fh3>\n      <p style=\"font-size:14.5px; line-height:1.58; color:#46505f; margin-top:9px;\">O acompanhamento ainda é reativo. Defina uma <strong>política de prazos<\u002Fstrong> (recebimento × pagamento × estoque) e monitore o <strong>ciclo financeiro<\u002Fstrong> mensalmente para antecipar necessidades de caixa antes que virem urgência.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"avoid-break\" style=\"border:1px solid #ececf3; border-radius:14px; padding:15px 20px; border-top:3px solid #a855f7;\">\n      <h3 style=\"font-size:18px; font-weight:700; color:#14233b;\">Indicadores <span style=\"color:#cf8a16;\">· 2.6<\u002Fspan><\u002Fh3>\n      <p style=\"font-size:14.5px; line-height:1.58; color:#46505f; margin-top:9px;\">Os dados existem, mas são pouco usados. Defina de <strong>5 a 7 indicadores-chave<\u002Fstrong> (margem, ponto de equilíbrio, inadimplência, prazo médio) em um <strong>painel mensal<\u002Fstrong>, conectando os números à rotina de gestão.<\u002Fp>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PÁGINA 7 — PRÓXIMOS PASSOS ===================== -->\n<section class=\"sheet\" style=\"width:210mm; min-height:297mm; background:#fff; box-shadow:0 6px 34px rgba(20,26,45,0.16); padding:22mm 18mm; box-sizing:border-box; display:flex; flex-direction:column;\">\n  <div style=\"display:flex; align-items:center; gap:12px; margin-bottom:6px;\">\n    <span style=\"width:26px; height:3px; background:#5a2fc2; border-radius:2px;\"><\u002Fspan>\n    <span style=\"font-size:12px; letter-spacing:0.16em; text-transform:uppercase; color:#5a2fc2; font-weight:700;\">Próximos Passos<\u002Fspan>\n  <\u002Fdiv>\n  <h2 style=\"font-size:30px; font-weight:800; color:#14233b; letter-spacing:-0.01em;\">Do diagnóstico ao resultado<\u002Fh2>\n  <p style=\"font-size:15.5px; line-height:1.62; color:#5f6b7c; margin-top:12px; max-width:5.4in;\">Este diagnóstico é o ponto de partida. A INOVARE traduz cada prioridade em um plano de implementação com metas, responsáveis e acompanhamento — para que o score de maturidade evolua de forma consistente.<\u002Fp>\n\n  <div style=\"display:flex; flex-direction:column; gap:14px; margin-top:30px;\">\n    <div style=\"display:flex; align-items:flex-start; gap:18px; border:1px solid #ececf3; border-radius:14px; padding:22px 24px;\">\n      <div style=\"font-family:'Archivo'; font-weight:800; font-size:22px; color:#5a2fc2; min-width:42px;\">01<\u002Fdiv>\n      <div><div style=\"font-size:17px; font-weight:700; color:#14233b; font-family:'Archivo';\">Sessão de devolutiva<\u002Fdiv><div style=\"font-size:14.5px; color:#6b7585; margin-top:4px; line-height:1.55;\">Apresentação dos resultados, esclarecimento de dúvidas e alinhamento de objetivos.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:flex-start; gap:18px; border:1px solid #ececf3; border-radius:14px; padding:22px 24px;\">\n      <div style=\"font-family:'Archivo'; font-weight:800; font-size:22px; color:#5a2fc2; min-width:42px;\">02<\u002Fdiv>\n      <div><div style=\"font-size:17px; font-weight:700; color:#14233b; font-family:'Archivo';\">Plano de ação<\u002Fdiv><div style=\"font-size:14.5px; color:#6b7585; margin-top:4px; line-height:1.55;\">Roadmap por prioridade com metas, responsáveis e prazos definidos.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex; align-items:flex-start; gap:18px; border:1px solid #ececf3; border-radius:14px; padding:22px 24px;\">\n      <div style=\"font-family:'Archivo'; font-weight:800; font-size:22px; color:#5a2fc2; min-width:42px;\">03<\u002Fdiv>\n      <div><div style=\"font-size:17px; font-weight:700; color:#14233b; font-family:'Archivo';\">Acompanhamento e reavaliação<\u002Fdiv><div style=\"font-size:14.5px; color:#6b7585; margin-top:4px; line-height:1.55;\">Revisões periódicas e novo diagnóstico para medir a evolução do score.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex:1;\"><\u002Fdiv>\n\n  <div style=\"background:#14112b; border-radius:18px; padding:34px 36px; color:#fff;\">\n    <div style=\"font-size:18px; font-weight:700; font-family:'Archivo'; letter-spacing:-0.01em;\">Vamos construir o próximo nível da sua gestão?<\u002Fdiv>\n    <p style=\"font-size:14.5px; line-height:1.6; color:#c7c2dd; margin-top:10px; max-width:5in;\">Fale com a INOVARE para transformar este diagnóstico em um plano de ação sob medida.<\u002Fp>\n    <div style=\"height:1px; background:rgba(255,255,255,0.12); margin:24px 0 20px;\"><\u002Fdiv>\n    <div style=\"display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;\">\n      <div>\n        <div style=\"font-family:'Archivo'; font-weight:800; font-size:18px; letter-spacing:0.04em;\">INOVARE<\u002Fdiv>\n        <div style=\"font-size:11.5px; color:#a9a3c4; letter-spacing:0.16em; text-transform:uppercase; margin-top:2px;\">Gestão Estratégica Integrada<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:right; font-size:14px; line-height:1.7;\">\n        <div style=\"color:#e7e3f5; font-weight:600;\">contato@inovarege.com.br<\u002Fdiv>
